name: News Digest

on:
  schedule:
    # UTC+5 hours: 06,09,12,15,18,21 → UTC: 01,04,07,10,13,16
    - cron: "0 1 * * *"
    - cron: "0 4 * * *"
    - cron: "0 7 * * *"
    - cron: "0 10 * * *"
    - cron: "0 13 * * *"
    - cron: "0 16 * * *"
  workflow_dispatch:  # allow manual run

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore SQLite database
        uses: actions/cache@v4
        with:
          path: data/news.db
          key: news-db-${{ github.run_id }}
          restore-keys: news-db-

      - name: Run aggregator
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_SESSION: ${{ secrets.TELEGRAM_SESSION }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python main.py

      - name: Publish digest to GitHub Pages
        if: always()
        run: |
          if [ -f data/last_digest.html ]; then
            cp data/last_digest.html docs/index.html
            git config user.email "actions@github.com"
            git config user.name "GitHub Actions"
            git add docs/index.html
            git diff --cached --quiet || git commit -m "chore: update digest [skip ci]"
            git push
          fi

      - name: Upload snapshot artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: snapshot-${{ github.run_id }}
          path: data/snapshot.json
          retention-days: 7
